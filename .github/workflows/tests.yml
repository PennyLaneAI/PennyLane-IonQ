name: Tests
on:
  push:
    branches:
      - master
  pull_request:

# Cancel previous runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          uv pip install --system --upgrade git+https://github.com/PennyLaneAI/pennylane.git
          uv pip install --system --pre --upgrade pennylane-lightning

          # Install testing tools defined in setup.py extras [dev] group
          uv pip install --system -e ".[dev]"

      - name: Build and Install Plugin Wheel
        run: |
          uv build --wheel
          uv pip install --system dist/pennylane_ionq*.whl --force-reinstall
      
      - name: Run Unit Tests
        env:
          IONQ_API_KEY: ${{ secrets.IONQ_API_KEY }}
        run: python -m pytest tests --cov=pennylane_ionq --cov-report=term-missing --cov-report=xml -p no:warnings --tb=native

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.codecov_token }}
          file: ./coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    # Only run on PRs from the main repo (security best practice)
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install --system --upgrade git+https://github.com/PennyLaneAI/pennylane.git
          uv pip install --system --pre --upgrade pennylane-lightning

          # Install testing tools defined in setup.py extras [dev] group
          uv pip install --system -e ".[dev]"

      - name: Build and Install Plugin Wheel
        run: |
          uv build --wheel
          uv pip install --system dist/pennylane_ionq*.whl --force-reinstall

      - name: Run Integration Tests
        env:
          IONQ_API_KEY: ${{ secrets.IONQ_API_KEY }}
        run: |
          pl-device-test --device=ionq.simulator --tb=short --skip-ops --shots=10000

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.codecov_token }}
          file: ./coverage.xml
